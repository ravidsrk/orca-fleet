<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="orca-fleet — autonomous fleets for the Orca runtime">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="fin" x1="880" y1="60" x2="1080" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#218bff"/>
      <stop offset="1" stop-color="#0550ae"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0550ae" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#218bff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0550ae" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#sea)"/>

  <!-- wave lines -->
  <path d="M0 224 C 150 208, 300 240, 450 224 S 750 208, 900 224 S 1120 240, 1200 224" stroke="url(#wave)" stroke-width="2" fill="none"/>
  <path d="M0 244 C 150 228, 300 260, 450 244 S 750 228, 900 244 S 1120 260, 1200 244" stroke="url(#wave)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M0 264 C 150 248, 300 280, 450 264 S 750 248, 900 264 S 1120 280, 1200 264" stroke="url(#wave)" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- orca dorsal fins: one lead fin, two trailing (the fleet) -->
  <path d="M960 224 C 952 168, 962 112, 998 76 C 992 128, 1006 176, 1026 224 Z" fill="url(#fin)"/>
  <path d="M1064 224 C 1059 186, 1066 150, 1088 128 C 1084 162, 1093 194, 1106 224 Z" fill="#0550ae" opacity="0.5"/>
  <path d="M880 224 C 876 192, 882 162, 900 144 C 897 172, 904 200, 915 224 Z" fill="#0550ae" opacity="0.3"/>

  <!-- wordmark -->
  <text x="72" y="140" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="64" font-weight="700" fill="#1f2328" letter-spacing="-1">orca-fleet</text>
  <text x="75" y="182" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="21" fill="#57606a">Autonomous fleets for the Orca runtime.</text>
  <text x="75" y="214" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="21" fill="#0969da">Ten missions. One outcome each. Verified, never trusted.</text>
</svg>
